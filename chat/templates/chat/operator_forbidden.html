<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>គ្មានសិទ្ធិប្រើប្រាស់ | ផ្ទាំងប្រតិបត្តិការ</title>
    <style>
      body { font-family: "Noto Sans Khmer", sans-serif; margin: 0; background: #f5f7fb; color: #1d2633; }
      .wrap { max-width: 680px; margin: 60px auto; padding: 0 16px; }
      .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; }
      .msg { background: #fff8dd; border: 1px solid #f0dc8f; color: #7c5f00; padding: 12px; border-radius: 8px; }
      .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
      a { text-decoration: none; border: 1px solid #d0d7de; padding: 8px 12px; border-radius: 8px; color: #1d2633; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>មិនមានសិទ្ធិប្រើផ្ទាំងប្រតិបត្តិការ</h1>
        <div class="msg">គណនីរបស់អ្នកមិនទាន់មានសិទ្ធិ Operator ទេ។ សូមអោយ Prompt Admin ឬ Super Admin បន្ថែមសិទ្ធិជាមុនសិន។</div>
        <div class="actions">
          <a href="{% url 'chat:operator_login' %}">ត្រឡប់ទៅចូលប្រើ</a>
          <a href="{% url 'chat:home' %}">ទៅទំព័រអតិថិជន</a>
          <a href="/admin/">ទៅ Django Admin</a>
        </div>
      </div>
    </div>
  </body>
</html>
