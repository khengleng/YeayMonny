<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>គ្មានសិទ្ធិប្រើប្រាស់ | ផ្ទាំងប្រតិបត្តិការ</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'chat/operator.css' %}" />
    <style>
      .wrap { max-width: 680px; margin: 60px auto; padding: 0 16px; }
      .card { padding: 24px; }
      h1 { margin-top: 0; }
      .msg { padding: 12px; }
      .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
      a { text-decoration: none; border: 1px solid var(--op-border); padding: 8px 12px; border-radius: 8px; color: var(--op-text); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>មិនមានសិទ្ធិប្រើផ្ទាំងប្រតិបត្តិការ</h1>
        <div class="msg">គណនីរបស់អ្នកមិនទាន់មានសិទ្ធិ Operator ទេ។ សូមអោយ Prompt Admin ឬ Super Admin បន្ថែមសិទ្ធិជាមុនសិន។</div>
        <div class="actions">
          <a href="{% url 'chat:operator_login' %}">ត្រឡប់ទៅចូលប្រើ</a>
          <a href="{% url 'chat:home' %}">ទៅទំព័រអតិថិជន</a>
          <a href="/admin/">ទៅ Fortune Telling Admin</a>
        </div>
      </div>
    </div>
  </body>
</html>
