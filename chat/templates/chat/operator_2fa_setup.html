<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>កំណត់ 2FA | ផ្ទាំងអ្នកគ្រប់គ្រង</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'chat/operator.css' %}" />
    <style>
      .wrap { max-width: 560px; }
      .hint { background: var(--op-warn-bg); border: 1px solid var(--op-warn-border); color: var(--op-warn-text); border-radius: 8px; padding: 10px; margin: 10px 0; }
      code { display: block; background: var(--op-surface); border: 1px dashed var(--op-border); padding: 8px; border-radius: 8px; margin-top: 6px; word-break: break-all; }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="wrap card">
        <h1>កំណត់សុវត្ថិភាព 2FA</h1>
        <p class="muted">គណនី: {{ username }}</p>
        {% if messages %}
          {% for message in messages %}
            <div class="msg">{{ message }}</div>
          {% endfor %}
        {% endif %}
        <div class="hint">
          បើក Google Authenticator/Authy -> Add account -> Enter setup key
          <code>{{ otp_secret }}</code>
          OTP URI:
          <code>{{ otp_uri }}</code>
        </div>
        <form method="post">
          {% csrf_token %}
          <label for="id_otp_code">{{ form.otp_code.label }}</label>
          {{ form.otp_code }}
          <button class="primary" type="submit">បញ្ជាក់ និងបើក 2FA</button>
        </form>
      </div>
    </main>
  </body>
</html>
