<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operator Login | Yeay Monny</title>
    <style>
      body { font-family: sans-serif; margin: 0; background: #f8f8f8; }
      .wrap { max-width: 480px; margin: 48px auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; }
      label { display: block; margin-top: 12px; font-weight: 600; }
      input { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ddd; border-radius: 8px; }
      button { margin-top: 16px; width: 100%; padding: 10px; border: 0; border-radius: 8px; background: #1f6feb; color: #fff; }
      .err { color: #b42318; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Operator Login</h1>
      <p>Sign in with staff account to edit Yeay Monny config.</p>
      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label for="id_username">Username</label>
        {{ form.username }}
        <label for="id_password">Password</label>
        {{ form.password }}
        <button type="submit">Sign In</button>
      </form>
    </div>
  </body>
</html>
