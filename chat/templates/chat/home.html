{% load static %}
<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeay Monny | យាយមុន្នី</title>
    <link rel="stylesheet" href="{% static 'chat/style.css' %}" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="header">
          <h1>យាយមុន្នី</h1>
          <p>Yeay Monny - យាយមើលជោគជាតា</p>
        </header>

        <section class="chat-box" aria-label="Chat history">
          {% for message in messages %}
          <article class="bubble {% if message.role == 'assistant' %}assistant{% else %}user{% endif %}">
            <p>{{ message.content|linebreaksbr }}</p>
          </article>
          {% endfor %}
        </section>

        <form method="post" class="chat-form">
          {% csrf_token %}
          <div class="grid">
            <label>
              ឈ្មោះ (ជម្រើស)
              <input type="text" name="name" value="{{ conversation.name }}" placeholder="ឧ. ស្រីពៅ" />
            </label>
            <label>
              ថ្ងៃកំណើត ឬ ឆ្នាំកំណើត (ជម្រើស)
              <input
                type="text"
                name="birth_info"
                value="{{ conversation.birth_info }}"
                placeholder="ឧ. ១២-០៥-១៩៩៩"
              />
            </label>
          </div>

          <label>
            ចង់មើលរឿងអ្វី? (ជម្រើស)
            <input
              type="text"
              name="question_focus"
              value="{{ conversation.question_focus }}"
              placeholder="ឧ. ស្នេហា, ការងារ, លុយ"
            />
          </label>

          <label>
            សំណួររបស់កូន
            <textarea
              name="message"
              rows="4"
              required
              placeholder="សួរយាយដោយភាសាសាមញ្ញ..."
            ></textarea>
          </label>

          <button type="submit">សួរយាយមុន្នី</button>
        </form>
      </section>
    </main>
  </body>
</html>
