{% load static %}
<!DOCTYPE html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeay Monny | យាយមុន្នី</title>
    <link rel="stylesheet" href="{% static 'chat/style.css' %}" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="header">
          <h1>យាយមុន្នី</h1>
          <p>Yeay Monny - យាយមើលជោគជាតា</p>
        </header>

        <section class="chat-box" aria-label="Chat history">
          {% for message in chat_messages %}
          <article class="bubble {% if message.role == 'assistant' %}assistant{% else %}user{% endif %}">
            <p>{{ message.content|linebreaksbr }}</p>
          </article>
          {% endfor %}
        </section>

        <form method="post" class="chat-form" enctype="multipart/form-data">
          {% csrf_token %}
          {% if messages %}
            {% for alert in messages %}
              <article class="bubble assistant">
                <p>{{ alert }}</p>
              </article>
            {% endfor %}
          {% endif %}
          <div class="grid">
            <label>
              ឈ្មោះ (ជម្រើស)
              <input type="text" name="name" value="{{ conversation.name }}" placeholder="ឧ. ស្រីពៅ" />
            </label>
            <label>
              ថ្ងៃកំណើត ឬ ឆ្នាំកំណើត (ជម្រើស)
              <input
                type="text"
                name="birth_info"
                value="{{ conversation.birth_info }}"
                placeholder="ឧ. ១២-០៥-១៩៩៩"
              />
            </label>
          </div>

          <div class="grid">
            <label>
              អ៊ីមែល (ជម្រើស)
              <input type="email" name="contact_email" value="{{ conversation.contact_email }}" placeholder="you@example.com" />
            </label>
            <label>
              លេខទូរស័ព្ទ (ជម្រើស)
              <input type="text" name="contact_phone" value="{{ conversation.contact_phone }}" placeholder="ឧ. 012345678" />
            </label>
          </div>

          <label>
            ចង់មើលរឿងអ្វី? (ជម្រើស)
            <input
              type="text"
              name="question_focus"
              value="{{ conversation.question_focus }}"
              placeholder="ឧ. ស្នេហា, ការងារ, លុយ"
            />
          </label>

          <label>
            សំណួររបស់កូន
            <textarea
              name="message"
              rows="4"
              placeholder="សួរយាយដោយភាសាសាមញ្ញ... (ឬភ្ជាប់សម្លេង/រូបភាព)"
            ></textarea>
          </label>

          <div class="grid">
            <label>
              ផ្ញើរូបភាព (ជម្រើស)
              <input type="file" name="image" accept="image/*" />
            </label>
            <label>
              ផ្ញើសម្លេង (ជម្រើស)
              <input type="file" name="voice" accept="audio/*" />
            </label>
          </div>

          <label style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" name="marketing_opt_in" {% if conversation.marketing_opt_in %}checked{% endif %} />
            ខ្ញុំយល់ព្រមទទួលព័ត៌មានថ្មីៗ និងសារផ្សព្វផ្សាយពីយាយមុន្នី
          </label>

          <button type="submit">សួរយាយមុន្នី</button>
        </form>
      </section>
    </main>
  </body>
</html>
